{% extends 'base.html' %}

{% block title %}Confirm Delete - {{ type }} - Result System{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow p-6 border text-center">
    <span class="text-4xl text-red-500 block mb-4">⚠️</span>
    <h1 class="text-xl font-bold text-gray-800 mb-2">Delete {{ type }}?</h1>
    <p class="text-sm text-gray-500 mb-6">
        Are you sure you want to delete the {{ type|lower }} <strong class="text-gray-800 font-semibold">"{{ object }}"</strong>? 
        This action cannot be undone.
    </p>

    <form method="POST" class="flex justify-center gap-3">
        {% csrf_token %}
        <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-semibold px-6 py-2.5 rounded-lg shadow transition">
            Yes, Delete
        </button>
        <a href="{% url back_url %}" class="border border-gray-300 hover:bg-gray-100 text-gray-700 font-semibold px-6 py-2.5 rounded-lg transition">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
